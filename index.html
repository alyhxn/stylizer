<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Link P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: system-ui; max-width: 500px; margin: 2rem auto; padding: 1rem; text-align: center; }
        .box { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-top: 20px; }
        #qrBox { display: none; }
        #chatBox { height: 150px; border: 1px solid #ccc; overflow-y: auto; text-align: left; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Magic Link WebRTC</h2>
    
    <div id="statusBox" class="box">
        <h3 id="statusText">Connecting to Signaling Server...</h3>
        
        <div id="qrBox">
            <p>Scan this on your phone, or share the link:</p>
            <a id="inviteLink" href="#" target="_blank" style="word-break: break-all; font-weight: bold;"></a>
        </div>
    </div>

    <div id="gameBox" class="box" style="display: none;">
        <h3>Connected! P2P Active</h3>
        <div id="chatBox"></div>
        <input type="text" id="txtMsg" placeholder="Type a message...">
        <button id="btnSend">Send</button>
    </div>

    <script>
        // Check if the URL has a '?join=' parameter
        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('join');

        // Initialize PeerJS (Connects to their free cloud server for the handshake)
        const peer = new Peer();
        let connection;

        const statusText = document.getElementById('statusText');
        const qrBox = document.getElementById('qrBox');
        const inviteLink = document.getElementById('inviteLink');
        const gameBox = document.getElementById('gameBox');
        const chatBox = document.getElementById('chatBox');

        function logMessage(msg, sender) {
            chatBox.innerHTML += `<div><strong>${sender}:</strong> ${msg}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setupConnection(conn) {
            connection = conn;
            connection.on('open', () => {
                document.getElementById('statusBox').style.display = 'none';
                gameBox.style.display = 'block';
                logMessage('Connection established directly between devices!', 'System');
            });
            connection.on('data', (data) => logMessage(data, 'Peer'));
        }

        peer.on('open', (myId) => {
            if (joinId) {
                // CLIENT LOGIC: If there is a join ID in the URL, connect to it
                statusText.innerText = "Joining Host...";
                const conn = peer.connect(joinId);
                setupConnection(conn);
            } else {
                // HOST LOGIC: No join ID, so we are the host. Generate the Magic Link.
                statusText.innerText = "Waiting for Player 2...";
                qrBox.style.display = 'block';
                
                // Create the magic link using the current URL + our Peer ID
                const currentUrl = window.location.href.split('?')[0];
                const link = `${currentUrl}?join=${myId}`;
                inviteLink.href = link;
                inviteLink.innerText = link;

                // Wait for the client to connect
                peer.on('connection', (conn) => {
                    setupConnection(conn);
                });
            }
        });

        // Sending Data
        document.getElementById('btnSend').onclick = () => {
            const msg = document.getElementById('txtMsg').value;
            if (msg && connection && connection.open) {
                connection.send(msg);
                logMessage(msg, 'You');
                document.getElementById('txtMsg').value = '';
            }
        };
    </script>
</body>
</html>
